# Model Accuracy Gate
# Runs attack test suite against WAF backend, fails if detection rate < 80%
name: Model Accuracy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  model-accuracy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for trained model
        id: model_check
        run: |
          MODEL_DIR="models/waf-anomaly"
          if [ -f "$MODEL_DIR/config.json" ] && [ -f "$MODEL_DIR/tokenizer.json" ]; then
            if [ -f "$MODEL_DIR/model.safetensors" ] || [ -f "$MODEL_DIR/pytorch_model.bin" ]; then
              echo "model_exists=true" >> $GITHUB_OUTPUT
              echo "Model found at $MODEL_DIR"
            else
              echo "model_exists=false" >> $GITHUB_OUTPUT
              echo "Model dir exists but weights missing"
            fi
          else
            echo "model_exists=false" >> $GITHUB_OUTPUT
            echo "Model not found at $MODEL_DIR - run scripts/train_anomaly_model.py first"
          fi

      - name: Start backend and run attack tests
        if: steps.model_check.outputs.model_exists == 'true'
        env:
          WAF_MODEL_PATH: models/waf-anomaly
          DATABASE_URL: sqlite:///./data/waf_dashboard.db
        run: |
          # Start backend in background
          uvicorn backend.main:app --host 0.0.0.0 --port 3001 &
          BACKEND_PID=$!

          # Wait for health
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health | grep -q 200; then
              echo "Backend ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Backend failed to start"
              kill $BACKEND_PID 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done

          # Run attack tests (80% minimum per roadmap)
          python scripts/attack_tests/run_all_tests.py --min-rate 80
          EXIT=$?
          kill $BACKEND_PID 2>/dev/null || true
          exit $EXIT

      - name: Skip (no model)
        if: steps.model_check.outputs.model_exists != 'true'
        run: |
          echo "::notice::Skipping model accuracy tests - no trained model at models/waf-anomaly. Run scripts/train_anomaly_model.py to enable."
