# Full WAF Stack: Gateway (with Rate Limit + DDoS) + Backend + Frontend + Redis + Postgres
# Use: docker compose -f docker-compose.yml -f docker-compose.full-stack.yml up -d
# Or: docker compose -f docker-compose.yml -f docker-compose.gateway.yml up -d
# (gateway needs redis from gateway compose)

services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: waf-gateway:latest
    container_name: waf-gateway-full
    restart: unless-stopped
    environment:
      UPSTREAM_URL: http://frontend:3000
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS_PER_MINUTE: "120"
      DDOS_ENABLED: "true"
      DDOS_BURST_THRESHOLD: "50"
      BACKEND_EVENTS_URL: http://backend:3001/api/events/ingest
      BACKEND_EVENTS_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - waf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/gateway/health"]
      interval: 30s
      timeout: 10s
      retries: 3
