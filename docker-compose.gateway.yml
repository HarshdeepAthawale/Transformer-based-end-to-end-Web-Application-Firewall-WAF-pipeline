services:
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: waf-gateway:latest
    container_name: waf-gateway
    restart: unless-stopped
    environment:
      UPSTREAM_URL: http://juice-shop:3000
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8080"
      WAF_ENABLED: "true"
      WAF_MODE: "monitor"
      WAF_THRESHOLD: "0.65"
      WAF_FAIL_OPEN: "true"
      BODY_MAX_BYTES: "10485760"
      PROXY_TIMEOUT: "30.0"
      LOG_LEVEL: "INFO"
    volumes:
      - ./models:/app/models:ro
      - ./config:/app/config:ro
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/gateway/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - waf-gateway-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  juice-shop:
    build:
      context: ./applications/app1-juice-shop
      dockerfile: Dockerfile
    container_name: waf-juice-shop
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - waf-gateway-network

networks:
  waf-gateway-network:
    driver: bridge
