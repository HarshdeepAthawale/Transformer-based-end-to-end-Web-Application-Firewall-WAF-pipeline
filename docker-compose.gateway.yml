services:
  redis:
    image: redis:7-alpine
    container_name: waf-gateway-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_gateway_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waf-gateway-network

  mongodb:
    image: mongo:7
    container_name: waf-gateway-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_gateway_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - waf-gateway-network

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    image: waf-gateway:latest
    container_name: waf-gateway
    restart: unless-stopped
    environment:
      UPSTREAM_URL: http://juice-shop:3000
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8080"
      WAF_ENABLED: "true"
      WAF_MODE: "monitor"
      WAF_THRESHOLD: "0.65"
      WAF_FAIL_OPEN: "true"
      BODY_MAX_BYTES: "10485760"
      WAF_BODY_INSPECT_MAX: "1048576"
      PROXY_TIMEOUT: "30.0"
      LOG_LEVEL: "INFO"
      REDIS_URL: redis://redis:6379
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: waf_gateway
      EVENT_RETENTION_DAYS: "30"
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS_PER_MINUTE: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      RATE_LIMIT_BURST: "20"
      DDOS_ENABLED: "true"
      DDOS_BURST_THRESHOLD: "50"
      DDOS_BURST_WINDOW_SECONDS: "5"
      DDOS_BLOCK_DURATION_SECONDS: "60"
    volumes:
      - ./models:/app/models:ro
      - ./config:/app/config:ro
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/gateway/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - waf-gateway-network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  juice-shop:
    build:
      context: ./applications/app1-juice-shop
      dockerfile: Dockerfile
    container_name: waf-juice-shop
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - waf-gateway-network

volumes:
  redis_gateway_data:
  mongodb_gateway_data:

networks:
  waf-gateway-network:
    driver: bridge
